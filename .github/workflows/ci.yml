name: ci

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev,plot]"
      - name: Test
        run: python -m pytest
      - name: Smoke constants
        run: python scripts/check_constants.py configs/constants_smoke.yml
      - name: Smoke regeneration
        run: python scripts/regenerate_all.py --config configs/m0_su2_smoke.yml
